<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"

    >
    <meta name="viewport"

        content="width=device-width, initial-scale=1.0">

    <title>SoundVault</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/cards.css">
</head>

<body>

    <nav class="navbar">

        <div class="logo-section">

            <div class="logo-icon">🎧</div>

            <h1 class="logo-text">SoundVault</h1>

        </div>

            <div class="creator-wrapper">

                <p class="creator-text">
                    👨‍💻 Developer: Prakash Choudhary
                </p>

            </div>
        
    </nav>

    <section class="hero">
        <div class="hero-background"></div>
        <div class="hero-content">

            <h1 class="hero-title">
                Discover Amazing Sounds
            </h1>

            <p class="hero-description">
                Find and explore high-quality sound effects for your projects.
            </p>

                <div class="search-box">

                    <div class="search-wrapper">

                        <input
                            type="text"
                            placeholder="Search sounds..."
                            class="search-input"
                            id="search-input"
                        >

                        <span id="clear-button">
                            ✕
                        </span>

                    </div>

                    <button
                        class="search-button"
                        id="search-button"
                    >
                        🔍
                    </button>

                </div>

          

        </div>

    </section>

        <section class="recent-section">

            <h2 class="recent-title">
                🕒 Recently Played
            </h2>

           <div class="recent-container">

           </div>

        </section>

    <section class="sounds-section">

        <div class="sounds-container">

        </div>

    </section>

    <script src="js/main.js"></script>

</body>

</html>
